[build]
# Install is server-only (railpack.json). Netlify builds the CRA app; this service is the API.
# No buildCommand — avoids a second full server install after npm ci.

# Fonts for Sharp on Linux; if missing, set: RAILPACK_DEPLOY_APT_PACKAGES="fontconfig fonts-dejavu-core"

[deploy]
startCommand = "cd server && node index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

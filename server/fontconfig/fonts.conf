<?xml version="1.0"?>
<fontconfig>
  <!-- Bundled via npm (dejavu-fonts-ttf) — no apt/fontconfig OS packages required -->
  <dir>/app/server/node_modules/dejavu-fonts-ttf/ttf</dir>
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>
  <cachedir>/tmp/fontconfig-cache</cachedir>
</fontconfig>

# Sharp SVG→PNG uses Pango/fontconfig; without fonts, OG images show missing-glyph boxes on Linux (e.g. Railway).
[phases.setup]
nixPkgs = ["...", "fontconfig", "dejavu_fonts"]

[phases.install]
cmds = ["cd server && npm install --legacy-peer-deps"]

[phases.build]
cmds = []

[start]
cmd = "cd server && node index.js"

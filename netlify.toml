[build]
  command = "CI=false DISABLE_ESLINT_PLUGIN=true npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"
  DISABLE_ESLINT_PLUGIN = "true"

# Function to prerender blog posts for social media crawlers
[functions]
  directory = "functions"

# Serve robots.txt directly (prevent SPA fallback)
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

# Sitemap via Edge Function (more reliable for Googlebot than regular functions)
[[edge_functions]]
  function = "sitemap"
  path = "/sitemap.xml"

[[edge_functions]]
  function = "sitemap"
  path = "/sitemap.xml/"

# NOTE: a legacy "/how-to/*-:id -> prerender-blog" bot redirect used to live
# here, but the prerender-blog function's URL regex only matches /learn/ paths
# (the current blog URL prefix). Any bot hitting /how-to/ would just get the
# default fallback HTML, so the rule did nothing useful. Old /how-to/ URLs are
# now handled by the broad 301 in public/_redirects which sends them straight
# to the canonical /learn/ equivalent for both bots and humans.

# Serve prerendered version for bots only - AquaSwap tokens
[[redirects]]
  from = "/aquaswap"
  to = "/.netlify/functions/prerender-aquaswap"
  status = 200
  force = true
  conditions = {User-Agent = "*bot*,*Bot*,*crawler*,*spider*,facebookexternalhit*,Twitterbot*,LinkedInBot*,Slackbot*,Discordbot*,WhatsApp*,TelegramBot*,Googlebot*"}

# OG card image proxied on primary domain — Telegram/WhatsApp fetch this reliably
# (same PNG as Railway generates; meta tags should point here, not *.railway.app)
[[edge_functions]]
  function = "og-aquaswap-card"
  path = "/og/aquaswap-card"

# Same pattern for the Free Online Courses tab — branded OG image with course
# title, CTA, and Cursa attribution. Meta tags reference this URL, not Railway.
[[edge_functions]]
  function = "og-free-course-card"
  path = "/og/course-card"

# Same pattern for Job listings — branded OG image with job title, work
# arrangement, pay, and "Apply Now" CTA. Meta tags reference this URL.
[[edge_functions]]
  function = "og-job-card"
  path = "/og/job-card"

[[edge_functions]]
  function = "og-external-job-card"
  path = "/og/external-job-card"

# GUARANTEED share URL - ALWAYS prerenders (no User-Agent check)
# Use this URL for sharing: /share/aquaswap?token=xxx&blockchain=xxx
# Handled by Edge Function which reliably serves meta tags to all bots
[[edge_functions]]
  function = "share-aquaswap"
  path = "/share/aquaswap"

# GUARANTEED game share URL - ALWAYS prerenders (no User-Agent check)
# Use this URL for sharing: /share/game/:id
# Handled by Edge Function which reliably serves meta tags to all bots
[[edge_functions]]
  function = "share-game"
  path = "/share/game/*"

# GUARANTEED blog share URL - ALWAYS prerenders (no User-Agent check)
# Use this URL for sharing: /share/blog/:id
# Handled by Edge Function which reliably serves meta tags to all bots
[[edge_functions]]
  function = "share-blog"
  path = "/share/blog/*"

# GUARANTEED free-course share URL - ALWAYS prerenders (no User-Agent check)
# Use this URL for sharing: /share/courses/:slug
# Handled by Edge Function which reliably serves meta tags to all bots
[[edge_functions]]
  function = "share-free-course"
  path = "/share/courses/*"

# GUARANTEED job share URL - ALWAYS prerenders (no User-Agent check)
# Use this URL for sharing: /share/job/:id
# Handled by Edge Function which reliably serves meta tags to all bots
[[edge_functions]]
  function = "share-job"
  path = "/share/job/*"

# Jooble ephemeral job share primer — OG on Aquads, redirect/canonical to Jooble
[[edge_functions]]
  function = "share-external-job"
  path = "/share/external-job"

# Canonical free course URLs (/learn/courses/:slug): crawlers should hit a course
# prerender (NOT the blog one). Must be listed BEFORE the broader /learn/* rule
# below — Netlify uses first-match-wins for redirects.
[[redirects]]
  from = "/learn/courses/*"
  to = "/.netlify/functions/prerender-free-course"
  status = 200
  force = true
  conditions = {User-Agent = "*bot*,*Bot*,*crawler*,*spider*,facebookexternalhit*,Twitterbot*,TelegramBot*,LinkedInBot*,Slackbot*,Discordbot*,WhatsApp*,Googlebot*"}

# Canonical blog URLs (/learn/slug-id): Facebook/Telegram often re-fetch og:url and hit the SPA.
# Serve prerendered HTML to crawlers so previews match Twitter/Open Graph debuggers.
[[redirects]]
  from = "/learn/*"
  to = "/.netlify/functions/prerender-blog"
  status = 200
  force = true
  conditions = {User-Agent = "*bot*,*Bot*,*crawler*,*spider*,facebookexternalhit*,Twitterbot*,TelegramBot*,LinkedInBot*,Slackbot*,Discordbot*,WhatsApp*,Googlebot*"}

# Handle service pages
[[redirects]]
  from = "/service/*"
  to = "/service.html"
  status = 200

# Permanent redirect: legacy listing landing → keyword-aligned URL (SEO)
[[redirects]]
  from = "/why-list"
  to = "/list-token-free"
  status = 301
  force = true

# Default SPA redirect (keep this last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200